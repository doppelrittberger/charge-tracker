name: charge-tracker
version: "1.0.0"
slug: charge-tracker
description: Track and visualize your EV charging sessions
url: https://github.com/doppelrittberger/charge-tracker
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
image: doppelrittberger/charge-tracker:{version}
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: Web UI
map:
  - share:rw
environment:
  CHARGE_TRACKER_DATA_FILE: /share/charge-sessions.json
startup: application
boot: auto
