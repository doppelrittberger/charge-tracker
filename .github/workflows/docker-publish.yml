name: Build & Push to Docker Hub

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Update config.yaml version
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.version.outputs.VERSION }}\"/" charge-tracker/config.yaml
          echo "Updated config.yaml to version ${{ steps.version.outputs.VERSION }}"

      - name: Commit and push config.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charge-tracker/config.yaml
          git diff --staged --quiet || git commit -m "chore: bump config.yaml version to ${{ steps.version.outputs.VERSION }}"
          git push origin main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/charge-tracker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/charge-tracker:${{ github.ref_name }}
